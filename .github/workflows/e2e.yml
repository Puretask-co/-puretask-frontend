name: Fullstack E2E (Playwright)

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "tests/e2e/**"
      - "playwright.config.ts"
      - "scripts/run-playwright-e2e.js"
      - ".env.example"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

concurrency:
  group: frontend-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  BACKEND_REPO: PURETASK/puretask-backend

jobs:
  e2e:
    name: Playwright Fullstack E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: puretask_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Setup Node.js (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Checkout backend repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACKEND_REPO }}
          path: puretask-backend

      - name: Setup Node.js (backend)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: puretask-backend/package-lock.json

      - name: Install backend dependencies
        working-directory: puretask-backend
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup backend test DB
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/puretask_e2e
        working-directory: puretask-backend
        run: npm run db:setup:test

      - name: Seed backend E2E users
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/puretask_e2e
          E2E_CLIENT_EMAIL: client@test.com
          E2E_CLIENT_PASSWORD: TestPass123!
          E2E_CLEANER_EMAIL: cleaner@test.com
          E2E_CLEANER_PASSWORD: TestPass123!
          E2E_ADMIN_EMAIL: admin@test.com
          E2E_ADMIN_PASSWORD: TestPass123!
        working-directory: puretask-backend
        run: npm run seed:e2e:users

      - name: Run fullstack Playwright smoke suite
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_BASE_URL: http://localhost:3001
          NEXT_PUBLIC_WS_URL: ws://localhost:4000
          E2E_BASE_URL: http://localhost:3001
          E2E_FRONTEND_PORT: "3001"
          E2E_BACKEND_PORT: "4000"
          E2E_BACKEND_WORKDIR: ${{ github.workspace }}/puretask-backend
          TEST_EMAIL: client@test.com
          TEST_PASSWORD: TestPass123!
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/puretask_e2e
        run: npm run test:e2e:smoke

      - name: Cleanup deterministic E2E users
        if: always()
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/puretask_e2e
        working-directory: puretask-backend
        run: npm run reset:e2e:users

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results

